services:
  - type: web
    name: intercom-csat-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: INTERCOM_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CANVAS_WEBHOOK_SECRET
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: DASHBOARD_ORIGIN
        sync: false
      - key: BATCH_CONCURRENCY
        value: "10"
      - key: SCHEDULE_CRON
        value: "*/30 * * * *"
      - key: NODE_ENV
        value: production

